name: CI - Vérification de l'infrastructure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validation de la configuration
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Création du fichier .env de test
        run: |
          cp .env.example .env

      - name: Vérification de la syntaxe docker-compose
        run: |
          docker compose -f docker/docker-compose.yml config

      - name: Vérification des fichiers obligatoires
        run: |
          echo "Vérification des fichiers..."
          test -f docker/docker-compose.yml && echo "OK : docker-compose.yml"
          test -f config/nginx.conf && echo "OK : nginx.conf"
          test -f scripts/deploy.sh && echo "OK : deploy.sh"
          test -f scripts/validate.sh && echo "OK : validate.sh"
          test -f .env.example && echo "OK : .env.example"
          test -f README.md && echo "OK : README.md"
          echo "Tous les fichiers sont présents !"

      - name: Vérification qu'aucun secret n'est exposé
        run: |
          echo "Vérification des secrets..."
          if git show HEAD:.env > /dev/null 2>&1; then
            echo "ERREUR : fichier .env présent dans le dépôt !"
            exit 1
          else
            echo "OK : aucun secret exposé"
          fi